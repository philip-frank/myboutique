<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive — Intake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #f9f9f7;
    color: #111;
    min-height: 100vh;
  }

  .login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .login-box {
    width: 100%;
    max-width: 380px;
  }

  .login-logo {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .login-sub {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.4;
    margin-bottom: 48px;
  }

  .login-field { margin-bottom: 16px; }

  .login-label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.5;
    margin-bottom: 8px;
  }

  .login-input {
    width: 100%;
    padding: 14px 16px;
    font-size: 15px;
    font-family: inherit;
    border: 0.5px solid rgba(0,0,0,0.15);
    background: #fff;
    color: #111;
    border-radius: 2px;
    outline: none;
  }

  .login-input:focus { border-color: #111; }

  .login-btn {
    width: 100%;
    padding: 16px;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: #111;
    color: #fff;
    border: none;
    cursor: pointer;
    margin-top: 24px;
    border-radius: 2px;
    transition: background 0.2s;
  }

  .login-btn:hover { background: #333; }
  .login-btn:disabled { background: #999; cursor: not-allowed; }

  .login-status {
    text-align: center;
    margin-top: 16px;
    font-size: 12px;
    letter-spacing: 0.1em;
    min-height: 20px;
    color: #c0392b;
  }

  .login-status.success { color: #2d7a4f; }

  .intake-screen { display: none; }

  .intake-wrap {
    padding: 40px 20px;
    max-width: 600px;
    margin: 0 auto;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
    padding-bottom: 20px;
    border-bottom: 0.5px solid rgba(0,0,0,0.1);
  }

  .logo {
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  .logo span {
    font-size: 11px;
    opacity: 0.4;
    letter-spacing: 0.15em;
    margin-left: 12px;
  }

  .header-actions { display: flex; gap: 16px; align-items: center; }

  .view-site, .logout-btn {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    color: #111;
    opacity: 0.5;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
  }

  .view-site:hover, .logout-btn:hover { opacity: 1; }

  .section-title {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.4;
    margin-bottom: 20px;
    margin-top: 40px;
  }

  .field { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.5;
    margin-bottom: 8px;
  }

  input, textarea, select {
    width: 100%;
    padding: 12px 14px;
    font-size: 14px;
    font-family: inherit;
    border: 0.5px solid rgba(0,0,0,0.15);
    background: #fff;
    color: #111;
    border-radius: 2px;
    appearance: none;
  }

  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: #111;
  }

  textarea { resize: vertical; min-height: 100px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .category-row { display: flex; gap: 10px; align-items: flex-end; }
  .category-row select { flex: 1; }

  .add-cat-btn {
    padding: 12px 16px;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: none;
    border: 0.5px solid rgba(0,0,0,0.15);
    cursor: pointer;
    white-space: nowrap;
    color: #111;
    border-radius: 2px;
  }

  .add-cat-btn:hover { background: #111; color: #fff; }

  .photo-area {
    border: 0.5px dashed rgba(0,0,0,0.2);
    background: #fff;
    border-radius: 2px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: border-color 0.2s;
  }

  .photo-area:hover { border-color: #111; }

  .photo-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .photo-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.4;
  }

  .photo-preview {
    display: none;
    width: 100%;
    max-height: 300px;
    object-fit: contain;
    margin-top: 16px;
    border-radius: 2px;
  }

  .submit-btn {
    width: 100%;
    padding: 16px;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: #111;
    color: #fff;
    border: none;
    cursor: pointer;
    margin-top: 40px;
    transition: background 0.2s;
    border-radius: 2px;
  }

  .submit-btn:hover { background: #333; }
  .submit-btn:disabled { background: #999; cursor: not-allowed; }

  .status {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    letter-spacing: 0.1em;
    min-height: 20px;
  }

  .status.success { color: #2d7a4f; }
  .status.error { color: #c0392b; }

  .inventory-section {
    margin-top: 60px;
    padding-top: 40px;
    border-top: 0.5px solid rgba(0,0,0,0.1);
  }

  .inv-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 0;
    border-bottom: 0.5px solid rgba(0,0,0,0.06);
  }

  .inv-img {
    width: 50px;
    height: 50px;
    object-fit: cover;
    background: #eee;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .inv-img-placeholder {
    width: 50px;
    height: 50px;
    background: #f0f0ee;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .inv-info { flex: 1; }
  .inv-name { font-size: 13px; line-height: 1.3; }
  .inv-meta { font-size: 11px; opacity: 0.4; margin-top: 2px; }
  .inv-price { font-size: 13px; font-weight: 300; }
  .inv-actions { display: flex; gap: 8px; }

  .inv-btn {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 10px;
    border: 0.5px solid rgba(0,0,0,0.15);
    background: none;
    cursor: pointer;
    border-radius: 2px;
    color: #111;
  }

  .inv-btn:hover { background: #111; color: #fff; }
  .inv-btn.delete:hover { background: #c0392b; border-color: #c0392b; color: #fff; }

  .search-bar {
    width: 100%;
    padding: 12px 14px;
    font-size: 14px;
    font-family: inherit;
    border: 0.5px solid rgba(0,0,0,0.15);
    background: #fff;
    color: #111;
    border-radius: 2px;
    margin-bottom: 20px;
  }

  .search-bar:focus { outline: none; border-color: #111; }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Archive</div>
    <div class="login-sub">Intake — Staff access only</div>

    <div id="emailStep">
      <div class="login-field">
        <label class="login-label">Email</label>
        <input class="login-input" type="email" id="loginEmail" placeholder="your@email.com">
      </div>
      <div class="login-field">
        <label class="login-label">Password</label>
        <input class="login-input" type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button class="login-btn" id="loginBtn" onclick="handleLogin()">Sign in</button>
      <div class="login-status" id="loginStatus"></div>
    </div>

    <div id="otpStep" style="display:none;">
      <div class="login-field">
        <label class="login-label">Verification code</label>
        <input class="login-input" type="text" id="otpCode" placeholder="6-digit code" maxlength="6">
      </div>
      <p style="font-size:12px;opacity:0.5;margin-bottom:16px;letter-spacing:0.05em;">A verification code was sent to your phone.</p>
      <button class="login-btn" id="otpBtn" onclick="handleOTP()">Verify</button>
      <div class="login-status" id="otpStatus"></div>
    </div>
  </div>
</div>

<div class="intake-screen" id="intakeScreen">
  <div class="intake-wrap">
    <header>
      <div class="logo">Archive <span>Intake</span></div>
      <div class="header-actions">
        <a class="view-site" href="/" target="_blank">View site</a>
        <button class="logout-btn" onclick="handleLogout()">Sign out</button>
      </div>
    </header>

    <div class="section-title">Add new item</div>

    <div class="field">
      <label>Photo</label>
      <div class="photo-area">
        <input type="file" accept="image/*" capture="environment" id="photoInput">
        <div class="photo-label" id="photoLabel">Tap to take photo or upload</div>
        <img class="photo-preview" id="photoPreview">
      </div>
    </div>

    <div class="field">
      <label>Item name</label>
      <input type="text" id="itemName" placeholder="e.g. Nike Air Jordan 7 Retro — Black Infrared">
    </div>

    <div class="field">
      <label>Description</label>
      <textarea id="itemDescription" placeholder="Condition details, notable features, any flaws..."></textarea>
    </div>

    <div class="field">
      <label>Category</label>
      <div class="category-row">
        <select id="itemCategory">
          <option value="">Select category</option>
        </select>
        <button class="add-cat-btn" onclick="addCategory()">+ Add</button>
      </div>
    </div>

    <div class="field">
      <label>Subcategory</label>
      <input type="text" id="itemSubcategory" placeholder="e.g. Jordan, Supreme, Band Tee, Nintendo...">
    </div>

    <div class="row">
      <div class="field">
        <label>Price ($)</label>
        <input type="number" id="itemPrice" placeholder="0.00" step="0.01">
      </div>
      <div class="field">
        <label>Size</label>
        <input type="text" id="itemSize" placeholder="e.g. 10, L, 32x32">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Brand</label>
        <input type="text" id="itemBrand" placeholder="e.g. Nike, Supreme, Burberry">
      </div>
      <div class="field">
        <label>Condition</label>
        <select id="itemCondition">
          <option value="">Select condition</option>
          <option value="New with tags">New with tags</option>
          <option value="New without tags">New without tags</option>
          <option value="Used - Like New">Used - Like New</option>
          <option value="Used - Good">Used - Good</option>
          <option value="Used - Fair">Used - Fair</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Location</label>
      <select id="itemLocation">
        <option value="">Select location</option>
        <option value="Main">Main</option>
        <option value="Storage A">Storage A</option>
        <option value="Storage B">Storage B</option>
        <option value="Brick and Mortar">Brick and Mortar</option>
      </select>
    </div>

    <div class="field">
      <label>Source</label>
      <select id="itemSource">
        <option value="Intake Form">Intake Form</option>
        <option value="eBay">eBay</option>
        <option value="Facebook">Facebook</option>
        <option value="Brick and Mortar">Brick and Mortar</option>
      </select>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">Add to Archive</button>
    <div class="status" id="statusMsg"></div>

    <div class="inventory-section">
      <div class="section-title">Current inventory</div>
      <input class="search-bar" type="text" placeholder="Search inventory..." oninput="handleSearch(this.value)">
      <div id="inventoryList"></div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://otlqamyuzkslsnpohijp.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90bHFhbXl1emtzbHNucG9oaWpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMDcwMjQsImV4cCI6MjA5MTg4MzAyNH0.sFgVZVTr20ODesG9Snwx3pr6R9z2B4XRbpz-iCCRgNw';
  const OWNER_EMAIL = 'cienplus@gmail.com';

  let db;
  let allInventory = [];
  let selectedPhoto = null;
  let userPhone = null;

  async function initSupabase() {
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
    db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: false,
        autoRefreshToken: false
      }
    });

    await db.auth.signOut();
    showLogin();
  }

  async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) {
      setLoginStatus('Please enter your email and password.');
      return;
    }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    const { data, error } = await db.auth.signInWithPassword({ email, password });

    if (error) {
      setLoginStatus(error.message);
      btn.disabled = false;
      btn.textContent = 'Sign in';
      return;
    }

    userPhone = data.user.phone;

    showIntake();
    }

    btn.disabled = false;
    btn.textContent = 'Sign in';
  }

  async function handleOTP() {
    const token = document.getElementById('otpCode').value.trim();

    if (!token) {
      setOtpStatus('Please enter the verification code.');
      return;
    }

    const btn = document.getElementById('otpBtn');
    btn.disabled = true;
    btn.textContent = 'Verifying...';

    const { data, error } = await db.auth.verifyOtp({
      phone: userPhone,
      token,
      type: 'sms'
    });

    if (error) {
      setOtpStatus(error.message);
      btn.disabled = false;
      btn.textContent = 'Verify';
      return;
    }

    showIntake();
  

  async function handleLogout() {
    await db.auth.signOut();
    showLogin();
    document.getElementById('emailStep').style.display = 'block';
    document.getElementById('otpStep').style.display = 'none';
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPassword').value = '';
  }

  function showLogin() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('intakeScreen').style.display = 'none';
  }

  function showIntake() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('intakeScreen').style.display = 'block';
    loadCategories();
    loadInventory();
  }

  function setLoginStatus(msg) {
    document.getElementById('loginStatus').textContent = msg;
  }

  function setOtpStatus(msg) {
    document.getElementById('otpStatus').textContent = msg;
  }

  async function loadCategories() {
    const { data, error } = await db
      .from('categories')
      .select('name')
      .order('created_at', { ascending: true });
    if (error) return;
    const select = document.getElementById('itemCategory');
    select.innerHTML = '<option value="">Select category</option>';
    data.forEach(cat => {
      const option = document.createElement('option');
      option.value = cat.name;
      option.textContent = cat.name;
      select.appendChild(option);
    });
  }

  async function addCategory() {
    const name = prompt('Enter new category name:');
    if (!name) return;
    const { error } = await db.from('categories').insert([{ name }]);
    if (error) { alert('Error: ' + error.message); return; }
    const select = document.getElementById('itemCategory');
    const option = document.createElement('option');
    option.value = name;
    option.textContent = name;
    select.appendChild(option);
    select.value = name;
  }

  document.getElementById('photoInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    selectedPhoto = file;
    const preview = document.getElementById('photoPreview');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    document.getElementById('photoLabel').style.display = 'none';
  });

  async function uploadPhoto(file) {
    const ext = file.name.split('.').pop();
    const filename = Date.now() + '.' + ext;
    const { error } = await db.storage.from('product-images').upload(filename, file);
    if (error) throw error;
    const { data } = db.storage.from('product-images').getPublicUrl(filename);
    return data.publicUrl;
  }

  async function handleSubmit() {
    const name = document.getElementById('itemName').value.trim();
    const category = document.getElementById('itemCategory').value;
    const price = document.getElementById('itemPrice').value;

    if (!name || !category || !price) {
      showStatus('Please fill in name, category and price.', 'error');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Adding...';
    showStatus('', '');

    try {
      let image_url = null;
      if (selectedPhoto) image_url = await uploadPhoto(selectedPhoto);

      const { error } = await db.from('inventory').insert([{
        name,
        description: document.getElementById('itemDescription').value.trim(),
        category,
        subcategory: document.getElementById('itemSubcategory').value.trim(),
        price: parseFloat(price),
        size: document.getElementById('itemSize').value.trim(),
        brand: document.getElementById('itemBrand').value.trim(),
        condition: document.getElementById('itemCondition').value,
        location: document.getElementById('itemLocation').value,
        source: document.getElementById('itemSource').value,
        status: 'available',
        image_url
      }]);

      if (error) throw error;
      showStatus('Item added to Archive.', 'success');
      resetForm();
      loadInventory();
    } catch (err) {
      showStatus('Error: ' + err.message, 'error');
    }

    btn.disabled = false;
    btn.textContent = 'Add to Archive';
  }

  function resetForm() {
    ['itemName','itemDescription','itemSubcategory','itemSize','itemBrand'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('itemCategory').value = '';
    document.getElementById('itemCondition').value = '';
    document.getElementById('itemLocation').value = '';
    document.getElementById('itemSource').value = 'Intake Form';
    document.getElementById('itemPrice').value = '';
    selectedPhoto = null;
    document.getElementById('photoPreview').style.display = 'none';
    document.getElementById('photoLabel').style.display = 'block';
  }

  function showStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status ' + (type || '');
  }

  async function loadInventory() {
    const { data, error } = await db.from('inventory').select('*').order('created_at', { ascending: false });
    if (error) return;
    allInventory = data;
    renderInventory(data);
  }

  function handleSearch(query) {
    const q = query.toLowerCase();
    renderInventory(allInventory.filter(i =>
      i.name.toLowerCase().includes(q) ||
      (i.brand && i.brand.toLowerCase().includes(q)) ||
      (i.category && i.category.toLowerCase().includes(q))
    ));
  }

  function renderInventory(items) {
    const list = document.getElementById('inventoryList');
    if (items.length === 0) {
      list.innerHTML = '<div style="font-size:13px;opacity:0.4;padding:20px 0;">No items found</div>';
      return;
    }
    list.innerHTML = items.map(item => `
      <div class="inv-item">
        ${item.image_url ? `<img class="inv-img" src="${item.image_url}" alt="${item.name}">` : `<div class="inv-img-placeholder"></div>`}
        <div class="inv-info">
          <div class="inv-name">${item.name}</div>
          <div class="inv-meta">${item.category}${item.size ? ' · ' + item.size : ''}${item.location ? ' · ' + item.location : ''} · ${item.status}</div>
        </div>
        <div class="inv-price">$${item.price}</div>
        <div class="inv-actions">
          <button class="inv-btn" onclick="markSold('${item.id}')">Sold</button>
          <button class="inv-btn delete" onclick="removeItem('${item.id}')">Delete</button>
        </div>
      </div>
    `).join('');
  }

  async function markSold(id) {
    await db.from('inventory').update({ status: 'sold' }).eq('id', id);
    loadInventory();
  }

  async function removeItem(id) {
    if (!confirm('Delete this item permanently?')) return;
    await db.from('inventory').delete().eq('id', id);
    loadInventory();
  }

  initSupabase();

    btn.disabled = true;
    btn.textContent = 'Verifying...';

    const { data, error } = await db.auth.verifyOtp({
      phone: userPhone,
      token,
      type: 'sms'
    });

    if (error) {
      setOtpStatus(error.message);
      btn.disabled = false;
      btn.textContent = 'Verify';
      return;
    }

    showIntake();
  }

  async function handleLogout() {
    await db.auth.signOut();
    showLogin();
    document.getElementById('emailStep').style.display = 'block';
    document.getElementById('otpStep').style.display = 'none';
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPassword').value = '';
  }

  function showLogin() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('intakeScreen').style.display = 'none';
  }

  function showIntake() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('intakeScreen').style.display = 'block';
    loadCategories();
    loadInventory();
  }

  function setLoginStatus(msg) {
    document.getElementById('loginStatus').textContent = msg;
  }

  function setOtpStatus(msg) {
    document.getElementById('otpStatus').textContent = msg;
  }

  async function loadCategories() {
    const { data, error } = await db.from('categories').select('name').order('created_at', { ascending: true });
    if (error) return;
    const select = document.getElementById('itemCategory');
    select.innerHTML = '<option value="">Select category</option>';
    data.forEach(cat => {
      const option = document.createElement('option');
      option.value = cat.name;
      option.textContent = cat.name;
      select.appendChild(option);
    });
  }

  async function addCategory() {
    const name = prompt('Enter new category name:');
    if (!name) return;
    const { error } = await db.from('categories').insert([{ name }]);
    if (error) { alert('Error: ' + error.message); return; }
    const select = document.getElementById('itemCategory');
    const option = document.createElement('option');
    option.value = name;
    option.textContent = name;
    select.appendChild(option);
    select.value = name;
  }

  document.getElementById('photoInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    selectedPhoto = file;
    const preview = document.getElementById('photoPreview');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    document.getElementById('photoLabel').style.display = 'none';
  });

  async function uploadPhoto(file) {
    const ext = file.name.split('.').pop();
    const filename = Date.now() + '.' + ext;
    const { error } = await db.storage.from('product-images').upload(filename, file);
    if (error) throw error;
    const { data } = db.storage.from('product-images').getPublicUrl(filename);
    return data.publicUrl;
  }

  async function handleSubmit() {
    const name = document.getElementById('itemName').value.trim();
    const category = document.getElementById('itemCategory').value;
    const price = document.getElementById('itemPrice').value;

    if (!name || !category || !price) {
      showStatus('Please fill in name, category and price.', 'error');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Adding...';
    showStatus('', '');

    try {
      let image_url = null;
      if (selectedPhoto) image_url = await uploadPhoto(selectedPhoto);

      const { error } = await db.from('inventory').insert([{
        name,
        description: document.getElementById('itemDescription').value.trim(),
        category,
        subcategory: document.getElementById('itemSubcategory').value.trim(),
        price: parseFloat(price),
        size: document.getElementById('itemSize').value.trim(),
        brand: document.getElementById('itemBrand').value.trim(),
        condition: document.getElementById('itemCondition').value,
        location: document.getElementById('itemLocation').value,
        source: document.getElementById('itemSource').value,
        status: 'available',
        image_url
      }]);

      if (error) throw error;
      showStatus('Item added to Archive.', 'success');
      resetForm();
      loadInventory();
    } catch (err) {
      showStatus('Error: ' + err.message, 'error');
    }

    btn.disabled = false;
    btn.textContent = 'Add to Archive';
  }

  function resetForm() {
    ['itemName','itemDescription','itemSubcategory','itemSize','itemBrand'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('itemCategory').value = '';
    document.getElementById('itemCondition').value = '';
    document.getElementById('itemLocation').value = '';
    document.getElementById('itemSource').value = 'Intake Form';
    document.getElementById('itemPrice').value = '';
    selectedPhoto = null;
    document.getElementById('photoPreview').style.display = 'none';
    document.getElementById('photoLabel').style.display = 'block';
  }

  function showStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status ' + (type || '');
  }

  async function loadInventory() {
    const { data, error } = await db.from('inventory').select('*').order('created_at', { ascending: false });
    if (error) return;
    allInventory = data;
    renderInventory(data);
  }

  function handleSearch(query) {
    const q = query.toLowerCase();
    renderInventory(allInventory.filter(i =>
      i.name.toLowerCase().includes(q) ||
      (i.brand && i.brand.toLowerCase().includes(q)) ||
      (i.category && i.category.toLowerCase().includes(q))
    ));
  }

  function renderInventory(items) {
    const list = document.getElementById('inventoryList');
    if (items.length === 0) {
      list.innerHTML = '<div style="font-size:13px;opacity:0.4;padding:20px 0;">No items found</div>';
      return;
    }
    list.innerHTML = items.map(item => `
      <div class="inv-item">
        ${item.image_url ? `<img class="inv-img" src="${item.image_url}" alt="${item.name}">` : `<div class="inv-img-placeholder"></div>`}
        <div class="inv-info">
          <div class="inv-name">${item.name}</div>
          <div class="inv-meta">${item.category}${item.size ? ' · ' + item.size : ''}${item.location ? ' · ' + item.location : ''} · ${item.status}</div>
        </div>
        <div class="inv-price">$${item.price}</div>
        <div class="inv-actions">
          <button class="inv-btn" onclick="markSold('${item.id}')">Sold</button>
          <button class="inv-btn delete" onclick="removeItem('${item.id}')">Delete</button>
        </div>
      </div>
    `).join('');
  }

  async function markSold(id) {
    await db.from('inventory').update({ status: 'sold' }).eq('id', id);
    loadInventory();
  }

  async function removeItem(id) {
    if (!confirm('Delete this item permanently?')) return;
    await db.from('inventory').delete().eq('id', id);
    loadInventory();
  }

  initSupabase();
</script>

</body>
</html>
