<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #f9f9f7;
    color: #111;
  }
  nav {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: rgba(249,249,247,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 0.5px solid rgba(0,0,0,0.08);
  }
  .nav-logo {
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }
  .nav-links a {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    color: #111;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .nav-links a:hover { opacity: 1; }
  hero {
    display: block;
    width: 100%;
    height: 100vh;
    position: relative;
    overflow: hidden;
  }
  .hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }
  .hero-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.38);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .hero-title {
    font-size: clamp(48px, 10vw, 120px);
    font-weight: 200;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: #fff;
    line-height: 1;
  }
  .hero-sub {
    margin-top: 16px;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
  }
  .categories {
    display: flex;
    justify-content: center;
    gap: 0;
    border-bottom: 0.5px solid rgba(0,0,0,0.1);
    overflow-x: auto;
  }
  .cat-btn {
    padding: 16px 28px;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    color: #111;
    opacity: 0.5;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .cat-btn:hover, .cat-btn.active {
    opacity: 1;
    border-bottom-color: #111;
  }
  .section-label {
    text-align: center;
    padding: 60px 40px 32px;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.4;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2px;
    padding: 0 2px 2px;
  }
  .card {
    background: #fff;
    position: relative;
    overflow: hidden;
    aspect-ratio: 3/4;
    cursor: pointer;
  }
  .card-img {
    width: 100%;
    height: 75%;
    object-fit: cover;
    display: block;
  }
  .card-img-placeholder {
    width: 100%;
    height: 75%;
    background: #f0f0ee;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #999;
  }
  .card-info {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .card-category {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.4;
  }
  .card-name {
    font-size: 13px;
    font-weight: 400;
    line-height: 1.3;
  }
  .card-price {
    font-size: 13px;
    font-weight: 300;
  }
  .card-buy {
    position: absolute;
    top: 16px;
    left: 16px;
    background: #111;
    color: #fff;
    border: none;
    padding: 8px 14px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: background 0.2s;
  }
  .card-buy:hover { background: #333; }
  .empty {
    text-align: center;
    padding: 80px 40px;
    font-size: 13px;
    opacity: 0.4;
    letter-spacing: 0.1em;
    grid-column: 1 / -1;
  }
  footer {
    text-align: center;
    padding: 60px 40px;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.3;
    border-top: 0.5px solid rgba(0,0,0,0.08);
    margin-top: 60px;
  }
  @media (max-width: 600px) {
    nav { padding: 16px 20px; }
    .nav-links { gap: 16px; }
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo" onclick="window.location.reload()">Archive</div>
  <ul class="nav-links" id="navLinks">
    <li><a href="#" onclick="filterItems('all', event)">All</a></li>
  </ul>
</nav>

<hero>
  <img class="hero-img" src="hero.jpeg" alt="Archive">
  <div class="hero-overlay">
    <div class="hero-title">Archive</div>
    <div class="hero-sub">Curated goods</div>
  </div>
</hero>

<div class="categories" id="categoryBar">
  <button class="cat-btn active" onclick="filterItems('all', event)">Everything</button>
</div>

<div class="section-label">Current Inventory</div>

<div class="grid" id="grid"></div>
<div id="pagination"></div>

<footer>
  Archive &mdash; All sales final &mdash; Payment via Cash App $zapfil &mdash; <a href="/privacy" style="color:inherit;opacity:0.6;text-decoration:none;">Privacy Policy</a>
</footer>

<script>
  const SUPABASE_URL = 'https://otlqamyuzkslsnpohijp.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90bHFhbXl1emtzbHNucG9oaWpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMDcwMjQsImV4cCI6MjA5MTg4MzAyNH0.sFgVZVTr20ODesG9Snwx3pr6R9z2B4XRbpz-iCCRgNw';

  let db;
  let allItems = [];
  let currentFilter = 'all';
  let currentPage = 1;

  async function initSupabase() {
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
    db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    await loadCategories();
    await loadInventory();
  }

  async function loadCategories() {
    const { data, error } = await db
      .from('categories')
      .select('name')
      .order('created_at', { ascending: true });
    if (error) { console.error('Error loading categories:', error); return; }
    const navLinks = document.getElementById('navLinks');
    const categoryBar = document.getElementById('categoryBar');
    data.forEach(cat => {
      const li = document.createElement('li');
      li.innerHTML = `<a href="#" onclick="filterItems('${cat.name}', event)">${cat.name}</a>`;
      navLinks.appendChild(li);
      const btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.textContent = cat.name;
      btn.onclick = (e) => filterItems(cat.name, e);
      categoryBar.appendChild(btn);
    });
  }

  async function loadInventory() {
    const { data, error } = await db
      .from('inventory')
      .select('*')
      .eq('status', 'available')
      .order('created_at', { ascending: false });
    if (error) { console.error('Error loading inventory:', error); return; }
    allItems = data;
    currentPage = 1;
    renderGrid(currentFilter);
  }

  function cashappLink(item) {
    const note = encodeURIComponent(item.name);
    return `https://cash.app/$zapfil/${item.price}?note=${note}`;
  }

  function renderGrid(filterCat) {
    const grid = document.getElementById('grid');
    const filtered = filterCat === 'all' ? allItems : allItems.filter(i => i.category === filterCat);

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty">No items found</div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    const perPage = 200;
    const totalPages = Math.ceil(filtered.length / perPage);
    const start = (currentPage - 1) * perPage;
    const pageItems = filtered.slice(start, start + perPage);

    grid.innerHTML = pageItems.map(item => `
      <div class="card">
        ${item.image_url
          ? `<img class="card-img" src="${item.image_url}" alt="${item.name}">`
          : `<div class="card-img-placeholder">${item.category}</div>`
        }
        <div class="card-info">
          <div class="card-category">${item.category}${item.size ? ' &mdash; ' + item.size : ''}</div>
          <div class="card-name">${item.name}</div>
          <div class="card-price">$${item.price}</div>
        </div>
        <a class="card-buy" href="${cashappLink(item)}" target="_blank">Buy &mdash; $${item.price}</a>
      </div>
    `).join('');

    document.getElementById('pagination').innerHTML = totalPages > 1 ? `
      <div style="text-align:center;padding:40px 0;display:flex;justify-content:center;gap:8px;flex-wrap:wrap;">
        ${currentPage > 1 ? `<button class="cat-btn" onclick="changePage(${currentPage - 1})">Previous</button>` : ''}
        ${Array.from({length: totalPages}, (_, i) => `
          <button class="cat-btn ${i + 1 === currentPage ? 'active' : ''}" onclick="changePage(${i + 1})">${i + 1}</button>
        `).join('')}
        ${currentPage < totalPages ? `<button class="cat-btn" onclick="changePage(${currentPage + 1})">Next</button>` : ''}
      </div>
    ` : '';
  }

  function changePage(page) {
    currentPage = page;
    renderGrid(currentFilter);
    window.scrollTo(0, 0);
  }

  function filterItems(cat, event) {
    event.preventDefault();
    currentFilter = cat;
    currentPage = 1;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    if (event.target.classList.contains('cat-btn')) {
      event.target.classList.add('active');
    }
    renderGrid(cat);
  }

  initSupabase();
</script>

</body>
</html>
